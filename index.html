<script>
let mm;
const md = `# 2026年Agent智能体面试重点

## 一、基础概念

### Q1 Agent基本架构与LLM区别
- **四大组件**
  - 感知 Perception：接收用户输入和环境信息
  - 规划 Planning：制定执行策略
  - 记忆 Memory：存储历史经验和上下文
  - 工具使用 Tool Use：调用外部API/数据库
- **vs 传统LLM调用**
  - 传统：预定义 → 线性 → 硬编码工作流
  - Agent：自主性 → 推理循环 → 动态调整策略
- 💡 关键词：自主性、推理循环、ReAct

### Q2 ReAct模式工作原理
- **三步循环**
  - Thought 思考：LLM分析当前状态，决定下一步
  - Action 行动：调用工具或执行操作
  - Observation 观察：获取工具返回结果
- 循环直到任务完成
- 💡 ReAct = Reasoning + Acting

### Q3 工作流Agent vs 自主Agent
- **工作流 Workflow**
  - DAG或状态机硬编码路径
  - 优点：可靠性高，结果可预期
  - 适用：报销审批、标准化客服
- **自主 Autonomous**
  - LLM决定循环次数和工具调用
  - 优点：灵活，适用于开放式任务
  - 适用：研究、代码编写、创意任务

## 二、记忆管理

### Q4 Agent记忆三层架构
- **短期记忆**
  - Context Window 存储当前对话历史
  - 最直接，但受token限制
- **长期记忆**
  - RAG + 向量数据库
  - 存储历史经验，执行前先检索相关经验
  - Embedding编码 → 向量数据库存储
- **趋势方案**
  - 长上下文模型直接处理超长历史
  - 摘要+结构化对记忆进行低位压缩

### Q9 状态爆炸与上下文溢出
- **State定义**
  - 严格状态结构（如LangGraph的state）
  - 只保存核心变量
- **Truncation截断**
  - 不是简单截断，根据语义重要性保留
  - 保留：system prompt + 最近对话 + 当前任务目标
- **Summary Buffer**
  - 旧对话摘要化
  - 存入context头部
- 💡 三种策略组合使用

## 三、多Agent协作

### Q5 为什么需要多Agent协作
- **单Agent瓶颈**
  - 注意力漂移：上下文太长关注点偏移
  - 推理链断裂：多步推理中间出错
- 适用场景：复杂任务、跨领域、长任务

### Q6 三种协作模式
- **中心化**
  - 主Agent拆分任务 → 分配子Agent
  - 适用：明确可拆分的任务
- **流水线**
  - A的输出给到B
  - 实例：代码生成 → 代码审核 → 修复
  - 适用：有明确阶段的任务
- **民主协作**
  - 多Agent共同讨论得出结论
  - 适用：需要多角度判断的任务

### Q7 编排者-执行者模式 Orchestrator-Worker
- **流程**
  - 主Agent拆分复杂任务为子任务
  - 分发给不同tools的Worker Agent
  - 最后汇总结果
- **实例**
  - 大型软件：一个写UI + 一个写后端 + 一个做测试
- **难点：任务拆分粒度**
  - 拆太细 → 通信成本变高
  - 拆太粗 → Agent产生幻觉
- 💡 粒度是关键

### Q8 反思-自我纠正模式
- **流程**
  - Agent生成输出
  - 另一个Agent扮演评审
  - 检查是否符合约束条件
  - 提供反馈 → 迭代改进
- **技术细节**
  - 使用Reflection架构
  - 记录迭代轨迹作为长短期记忆
  - 避免犯同样的错误
- 💡 Reflection = 评审 + 迭代 + 记忆

### Q5+ 无限循环与通信冗余
- **循环检测**
  - 引入状态机控制流程
  - 设置最大迭代次数
- **偷窥控制**
  - Agent阶段对话进行摘要处理
- **终止条件**
  - 明确定义任务完成标准

## 四、工程实践

### Q10 工具调用可靠性
- **语法层**
  - JSON Mode / 强制性约束
  - 确保输出格式合法
- **逻辑层**
  - 确认机制：高风险操作（删库、转账）必须人工确认
- **自修复**
  - 参数不合法 → 报错返回LLM → 自我修复
  - 重试逻辑 + 错误反馈
- 💡 三层保障：语法 → 逻辑 → 自修复

### Q11 LangGraph vs 传统工作流
- **传统工作流**
  - 边是固定的
  - 节点按顺序执行
- **LangGraph**
  - 边是条件边：由LLM输出决定下一步走向
  - 节点支持循环：Agent可不断尝试直到成功
- 💡 LangGraph = 条件边 + 循环节点

### Q12 Agent性能量化指标
- **任务成功率**
  - 最核心、最重要
- **平均推理步数**
  - 步数越少 → 成本越低 → 响应越快
- **工具调用准确率**
  - 减少无效调用
- 💡 成功率 > 步数 > 准确率

## 五、企业级RAG问题

### Q13 检索冲突处理
- **元数据加权**
  - 根据文档实时性、权威性做权重排序
- **多智能体辩论**
  - 不同Agent用不同思考方式对比
  - 识别冲突点，反馈给用户
- **引用溯源**
  - 输出附带来源链接
  - 用户做最终校验

### Q14 企业知识库权限隔离
- **RBAC权限对齐**
  - 向量数据库中每个embedding附带ACL元数据
- **物理隔离**
  - Agent检索时强制注入当前用户信息作为filter
  - 在向量检索阶段就做到隔离
  - 不靠提示词约束
- 💡 ACL元数据 + Filter注入 = 物理隔离

### Q15 知识库动态更新应对
- **动态路由**
  - Agent识别问题类型
  - 实时性问题优先调用API/搜索工具
  - 而不是检索知识库
- **流式索引更新**
  - Kafka等数据流监控知识库变化
  - 增量写入
- **缓存失效**
  - 高频问题设TTL缓存
  - 元数据更新触发缓存失效

### Q16 RAG图文混合检索
- **占位符约束**
  - Prompt中约束LLM使用图片占位符（IMG_001）
  - 检索到图片时保留占位符
- **前端渲染**
  - 解析器匹配占位符
  - 从对象存储拉取真实图片
- **优势**
  - 保证图文位置对应
  - 避免大图塞入context，节省token

### Q17 大表格放入prompt优化
- **先摘要再选择性读取**
  - Agent通过表头摘要判断是否包含所需数据
  - 生成查询指令，只提取相关行列
  - 将子表送给模型
- **优势**
  - 减少干扰信息
  - 准确度更高
- 💡 摘要 → 判断 → 精确提取

### Q18 多页文档图文关联错误
- **滑动窗口 + 跨页聚合**
  - 解析时维护滑动窗口
  - 图片在页尾、描述在上一页末时
  - 布局距离计算：将临近文本块作为图片上下文元数据
  - 共同存储，检索时保持相关性
- 💡 滑动窗口 + 布局距离 = 跨页关联

## 六、字节跳动面试真题

### 基础功底（一面）

#### BD1 多模态大模型结构
- **视觉编码器和语言模型的衔接方式**
  - 视觉编码器（ViT/CLIP）提取图像特征
  - Projection Layer 将视觉特征映射到语言模型embedding空间
  - 语言模型接收视觉token + 文本token统一处理

#### BD2 ReAct消息格式设计
- **tool response用什么角色传回？为什么？**
  - 使用 system 或 tool 角色传回
  - 避免污染 assistant 角色的生成分布
  - 保持 user/assistant 的干净对话流

#### BD3 SFT/RLHF/PPO/DPO训练流程
- **为什么SFT需要observation tokens？**
  - SFT阶段：监督微调，教模型格式和工具调用方式
  - RLHF/PPO：人类反馈强化学习，优化输出质量
  - DPO：直接偏好优化，简化RLHF流程
  - Observation tokens：SFT中需要标注工具返回结果，教模型学会等待和处理反馈

#### BD4 Redis在Agent系统中的作用
- **为什么不用数据库通信？**
  - Redis：低延迟、内存级读写、支持Pub/Sub
  - Agent间实时通信需要毫秒级响应
  - 数据库适合持久化，不适合高频实时通信场景

#### BD5 缓存策略设计
- **ES索引什么情况下失效？**
  - 知识库更新时需要增量重建索引
  - 文档版本变更、权限调整时缓存失效
  - TTL过期 + 变更事件触发双重机制

### 项目深挖（二面）

#### BD6 死循环与异常处理
- **死循环处理**
  - 设置最大迭代次数（如10轮）
  - 检测重复动作模式，触发熔断
- **异常处理机制**
  - try-catch包裹工具调用
  - 异常信息反馈给LLM重新决策

#### BD7 工具调用失败处理
- **容错策略**
  - 重试机制：指数退避 + 最大重试次数
  - 降级方案：失败后选择备选工具
  - 错误信息结构化返回给LLM

#### BD8 上百个工具快速准确选择
- **工具路由策略**
  - 工具分类 + 语义检索：先缩小候选集
  - 工具描述Embedding → 向量检索Top-K
  - 动态工具注册表，按需加载

#### BD9 长上下文对话不遗忘关键信息
- **除向量检索外的方法**
  - 结构化记忆表：显式记录关键实体和状态
  - 摘要压缩：定期对历史对话做摘要
  - 关键信息提取 + Slot Filling机制

#### BD10 成本和效果平衡
- **策略**
  - 路由分层：简单问题用小模型，复杂问题用大模型
  - 缓存命中率优化：相似问题复用结果
  - Token预算控制：动态调整context长度

#### BD11 Agent决策出错导致数据误删
- **防范机制**
  - 高风险操作必须人工确认（Human-in-the-Loop）
  - 操作前快照 + 软删除 + 审计日志
  - 权限分级：Agent只有低风险操作权限

#### BD12 用户需求模糊处理
- **如"按老样子帮我定"**
  - 意图消解：检索历史偏好和行为模式
  - 主动确认：输出理解内容让用户确认
  - 渐进式交互：先执行再反馈调整

### 系统设计（三面）

#### BD13 Kafka在Agent系统中的应用
- **应用场景**
  - Agent间异步通信、任务队列
  - 审计日志流、事件驱动架构
- **消息顺序性保证**
  - 同一Agent的事件发到同一Partition
  - Partition Key使用Agent ID或Session ID

#### BD14 Workflow和Agent的本质区别
- **架构角度分析**
  - Workflow：确定性边 + 预定义路径，控制流在编排层
  - Agent：LLM决策边 + 动态路径，控制流在模型层
  - 本质区别：控制流由谁决定（代码 vs 模型）

#### BD15 多Agent系统三层架构
- **架构设计**
  - 协调层：任务拆分和分配
  - 执行层：具体Agent执行子任务
  - 共享层：状态存储和通信总线
- **Agent间通信方式**
  - 消息队列（异步）/ 共享状态（同步）/ 直接调用（紧耦合）

#### BD16 Agent大规模落地最大挑战
- **可控性和能力的平衡**
  - 能力越强 → 越难控制 → 出错代价越大
  - 灰度发布 + A/B测试 + 安全护栏
  - 分级部署：内部试用 → 受控场景 → 开放场景

#### BD17 MCP/Agent-to-Agent/Function Calling
- **三者定义与区别**
  - Function Calling：LLM调用外部工具的协议
  - MCP（Model Context Protocol）：标准化模型与工具的接口协议
  - Agent-to-Agent：Agent之间的通信和协作协议
  - 区别：工具调用 vs 接口标准 vs Agent通信

#### BD18 Agent上下文工程
- **主流技术**
  - Context Window管理：system prompt + 动态context + 工具结果
  - 有效的上下文管理策略
  - RAG检索增强 + 记忆压缩 + 结构化Prompt

#### BD19 模型和框架选择
- **怎么决定用什么模型和框架**
  - 任务复杂度、延迟要求、成本预算
  - 架构升级方案：单模型 → 多模型路由 → Agent集群
  - 评估指标驱动迭代

#### BD20 手写算法
- **考察重点**
  - 反转链表：基础数据结构操作
  - 二叉树最大宽度：BFS层序遍历
  - LeetCode22 括号生成：回溯算法
  - 考察工程编码能力
`;

(async () => {
  const { Transformer } = markmap;
  const { Markmap } = window.markmap;
  const transformer = new Transformer();
  const { root } = transformer.transform(md);

  const palette = {
    0: '#e6edf3', 1: '#58a6ff', 2: '#f0883e', 3: '#3fb950', 4: '#bc8cff', 5: '#f778ba', 6: '#ff6b6b'
  };
  const getColor = (node) => {
    let d = 0, n = node;
    while (n.parent) { d++; n = n.parent; }
    return palette[d] || '#8b949e';
  };

  mm = Markmap.create('#mindmap', {
    autoFit: true,
    color: getColor,
    maxWidth: 340,
    paddingX: 12,
    duration: 300,
  }, root);
})();

function expandAll() {
  function walk(node) { node.payload = { ...node.payload, fold: 0 }; node.children?.forEach(walk); }
  walk(mm.state.data);
  mm.renderData();
  mm.fit();
}
function collapseAll() {
  function walk(node, depth) {
    if (depth > 1) node.payload = { ...node.payload, fold: 1 };
    node.children?.forEach(c => walk(c, depth + 1));
  }
  walk(mm.state.data, 0);
  mm.renderData();
  mm.fit();
}
</script>
