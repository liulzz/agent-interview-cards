    a: [

      "💡 熟练掌握经典算法模板"

let current = 0;
const done = new Set();

const catColors = {
  "基础概念": "#58a6ff", "记忆管理": "#f0883e", "多Agent协作": "#3fb950",
  "工程实践": "#bc8cff", "企业级RAG": "#f778ba",
  "字节一面（基础）": "#f97316", "字节二面（项目深挖）": "#ec4899", "字节三面（系统设计）": "#8b5cf6"
};
const catNames = [...new Set(DATA.map(d => d.cat))];

// Build nav
const navEl = document.getElementById('nav');
catNames.forEach(cat => {
  const btn = document.createElement('button');
  btn.textContent = cat;
  btn.style.borderColor = catColors[cat];
  btn.onclick = () => {
    const idx = DATA.findIndex(d => d.cat === cat);
    if (idx >= 0) goTo(idx);
  };
  navEl.appendChild(btn);
});

// Build cards
const cardsEl = document.getElementById('cards');
DATA.forEach((d, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `card-${i}`;
  card.onclick = () => { card.classList.toggle('flipped'); markDone(i); };
  card.innerHTML = `
    <div class="card-inner">
      <div class="card-front">
        <span class="q-num">${d.id}</span>
        <span class="q-tag" style="background:${catColors[d.cat]}22;color:${catColors[d.cat]}">${d.cat}</span>
        <h2>${d.q}</h2>
        <div class="hint">👆 点击翻转查看答案</div>
      </div>
      <div class="card-back">
        <h3>💡 ${d.id} 参考答案</h3>
        <ul>${d.a.map(a => `<li>${a}</li>`).join('')}</ul>
      </div>
    </div>`;
  cardsEl.appendChild(card);
});

// Build progress
const progEl = document.getElementById('progress');
DATA.forEach((d, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.id = `dot-${i}`;
  dot.title = `${d.id} ${d.q}`;
  dot.style.background = catColors[d.cat];
  dot.style.opacity = '0.3';
  dot.onclick = () => goTo(i);
  progEl.appendChild(dot);
});

function goTo(i) {
  current = i;
  document.getElementById(`card-${i}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
  updateActive();
}

function markDone(i) {
  done.add(i);
  document.getElementById(`dot-${i}`).style.opacity = '1';
  document.getElementById(`doneCount`).textContent = done.size;
  document.getElementById('pct').textContent = Math.round(done.size / DATA.length * 100) + '%';
}

function updateActive() {
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  const cat = DATA[current].cat;
  document.querySelector(`.nav button:nth-child(${catNames.indexOf(cat) + 1})`)?.classList.add('active');
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'j') { current = Math.min(current + 1, DATA.length - 1); goTo(current); }
  if (e.key === 'ArrowLeft' || e.key === 'k') { current = Math.max(current - 1, 0); goTo(current); }
  if (e.key === ' ') { e.preventDefault(); document.getElementById(`card-${current}`).click(); }
});

updateActive();
</script>
